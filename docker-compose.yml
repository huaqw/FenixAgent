services:
    postgres:
        image: postgres:16-alpine
        container_name: mothership-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: rcs
            POSTGRES_PASSWORD: rcs
            POSTGRES_DB: rcs
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rcs"]
            interval: 5s
            timeout: 5s
            retries: 5

    openviking:
        image: ghcr.io/volcengine/openviking:v0.3.14
        container_name: mothership-openviking
        profiles:
            - openviking
        restart: unless-stopped
        ports:
            - "1933:1933"
            - "8020:8020"
        volumes:
            - ./deploy/openviking/ov.conf:/app/.openviking/ov.conf
            - openviking-data:/app/data
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 20s

    rcs:
        # image: rcs:latest
        build:
            context: .
            dockerfile: Dockerfile
        container_name: mothership-beta
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "3001:3000"
        environment:
            RCS_HOST: 0.0.0.0
            RCS_PORT: 3000
            RCS_BASE_URL: http://localhost:3000
            RCS_API_KEYS: 8198625e-f6e0-4402-a278-b1910408c160
            DATABASE_URL: postgres://rcs:rcs@postgres:5432/rcs
            ACPX_G_URL: http://localhost:8848
            RCS_KNOWLEDGE_PROVIDER: ${RCS_KNOWLEDGE_PROVIDER:-}
            RCS_KNOWLEDGE_BASE_URL: ${RCS_KNOWLEDGE_BASE_URL:-}
            RCS_KNOWLEDGE_API_KEY: ${RCS_KNOWLEDGE_API_KEY:-}
            OPENCODE_DISABLE_AUTOUPDATE: "1"
            OPENCODE_DISABLE_TELEMETRY: "1"
        volumes:
            # OpenCode 全局配置：直接注入宿主机配置文件
            - ~/.config/opencode/opencode.json:/root/.config/opencode/opencode.json
            # Skill 技能目录：直接注入宿主机 skills
            - ~/.agents/skills:/root/.agents/skills
            # OpenCode 运行时状态，如认证/会话缓存，位于 ~/.local/share/opencode
            - rcs-opencode-data:/root/.local/share/opencode
            # Agent 工作目录，环境的 workspacePath 应指向 /workspaces 下的路径
            - rcs-workspaces:/workspaces
            # acpx-g workflow 模板文件，宿主机修改后容器内即时生效
            - ./workflow:/app/workflow
        healthcheck:
            test:
                [
                    "CMD",
                    "bun",
                    "-e",
                    "fetch('http://127.0.0.1:3000/health').then((r) => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

volumes:
    # PostgreSQL 持久化数据
    postgres-data:
    # OpenCode 认证/缓存/状态持久化
    rcs-opencode-data:
    # 容器内 Agent 工作空间持久化
    rcs-workspaces:
    # OpenViking 数据持久化
    openviking-data:
